<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  {% load static %}
<link rel="stylesheet" type="text/css" href="{% static 'css/signin.css' %}">
  
</head>

<body>
  
  <div class="main">

    <div class="form">
      <form action="" method="post">
        {% csrf_token %}
        <h2>Login </h2>
        <input type="email" name="email" placeholder="Enter Email ">
        <input type="password" name="password" placeholder="Enter Password "minlength = "8"required>
        <button class="btx"> <a href="{% url 'home' %}">Login</a></button>
        <p class="link"> Don't have an account
          <a href="{% url 'signup' %}">sign up </a>
        </p>
        <p class="liw">Login with</p>
        <div class="icon"><a href="https://www.facebook.com" target="_blank"><i class="fa-brands fa-facebook"></i></a>
          <a href="https://www.google.com" target="_blank"><i class="fa-brands fa-google"></i></a>
          <a href="https://www.apple.com" target="_blank"><i class="fa-brands fa-apple"></i></a>

        </div>

      </form>
    </div>
  </div>

  </div>

  <script src="https://kit.fontawesome.com/b898ef8082.js" crossorigin="anonymous"></script>





</body>

</html>
