<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Payment Page</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/payment.css' %}">
</head>

<body>

  <div class="payment-container">
    <h2>Payment</h2>
    <form class="payment-form" action="#" method="post">
        {% csrf_token %}
      <label for="card-name">Cardholder Name</label>
      <input type="text" id="card-name" name="Cardholder_Name" required>

      <label for="card-number">Card Number</label>
      <input type="text" id="card-number" name="Card_Number" maxlength="16" required>

      <label for="exp-date">Expiration Date</label>
      <input type="date" id="exp-date" name="Expiration_Date" placeholder="MM/YY" required>

      <label for="cvv">CVV</label>
      <input type="password" id="cvv" name="cvv" maxlength="4" required>

      <button type="submit">Pay Now</button>
    </form>
  </div>

</body>

</html>
